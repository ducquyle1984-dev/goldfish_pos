<!doctype html>
<html>
  <head>
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="description" content="Goldfish POS â€” Point of Sale System" />

    <!-- Never cache this file so browsers always fetch the latest build -->
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Goldfish POS" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <title>Goldfish POS</title>
    <link rel="manifest" href="manifest.json" />

    <!-- DNS prefetch for Firebase services hit at startup -->
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />
    <link
      rel="preconnect"
      href="https://firestore.googleapis.com"
      crossorigin
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(
          180deg,
          #0a1628 0%,
          #0d2b45 35%,
          #0f4c75 70%,
          #1b6ca8 100%
        );
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        animation: fadeIn 0.4s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Goldfish SVG spinner */
      .fish-ring {
        width: 90px;
        height: 90px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top: 3px solid #ff8c00;
        border-right: 3px solid #ff8c00;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .logo-wrap {
        position: relative;
        width: 90px;
        height: 90px;
      }

      .fish-icon {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 36px;
        animation: bob 1.8s ease-in-out infinite;
      }

      @keyframes bob {
        0%,
        100% {
          transform: translate(-50%, -50%) rotate(-8deg);
        }
        50% {
          transform: translate(-50%, -54%) rotate(8deg);
        }
      }

      .app-name {
        color: #ffffff;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 1.2px;
      }

      .app-sub {
        color: rgba(255, 255, 255, 0.45);
        font-size: 11px;
        letter-spacing: 3.5px;
        text-transform: uppercase;
        margin-top: -14px;
      }

      .loading-dots {
        display: flex;
        gap: 6px;
        margin-top: 4px;
      }

      .loading-dots span {
        width: 6px;
        height: 6px;
        background: rgba(255, 140, 0, 0.7);
        border-radius: 50%;
        animation: pulse 1.2s ease-in-out infinite;
      }

      .loading-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .loading-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes pulse {
        0%,
        80%,
        100% {
          transform: scale(0.6);
          opacity: 0.4;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }

      /* Hide Flutter's font metric ruler so it never flashes on screen */
      flt-ruler-host {
        visibility: hidden !important;
        overflow: hidden !important;
        pointer-events: none !important;
      }

      /* Bubbles */
      .bubbles {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .bubble {
        position: absolute;
        bottom: -20px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 50%;
        animation: rise linear infinite;
      }
      @keyframes rise {
        to {
          transform: translateY(-110vh);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="bubbles">
      <div
        class="bubble"
        style="
          left: 8%;
          width: 10px;
          height: 10px;
          animation-duration: 7s;
          animation-delay: 0s;
        "
      ></div>
      <div
        class="bubble"
        style="
          left: 20%;
          width: 6px;
          height: 6px;
          animation-duration: 9s;
          animation-delay: 1s;
        "
      ></div>
      <div
        class="bubble"
        style="
          left: 35%;
          width: 14px;
          height: 14px;
          animation-duration: 6s;
          animation-delay: 2s;
        "
      ></div>
      <div
        class="bubble"
        style="
          left: 55%;
          width: 8px;
          height: 8px;
          animation-duration: 8s;
          animation-delay: 0.5s;
        "
      ></div>
      <div
        class="bubble"
        style="
          left: 70%;
          width: 12px;
          height: 12px;
          animation-duration: 7.5s;
          animation-delay: 3s;
        "
      ></div>
      <div
        class="bubble"
        style="
          left: 85%;
          width: 6px;
          height: 6px;
          animation-duration: 10s;
          animation-delay: 1.5s;
        "
      ></div>
    </div>

    <div id="loading">
      <div class="logo-wrap">
        <div class="fish-ring"></div>
        <div class="fish-icon">ðŸŸ</div>
      </div>
      <div class="app-name">Goldfish POS</div>
      <div class="app-sub">Point of Sale System</div>
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>

    <script>
      // â”€â”€ Service worker hard-reset â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      // Our new Flutter build no longer registers a service worker.
      // If the browser still has an OLD service worker from a previous build,
      // it intercepts requests and serves stale cached JS â†’ white screen.
      // We unconditionally unregister every SW on every page load; if any
      // existed we do ONE reload so the fresh files are fetched with no SW.
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          var hadSW = regs.length > 0;
          Promise.all(
            regs.map(function (r) {
              return r.unregister();
            }),
          ).then(function () {
            if (hadSW) {
              caches.keys().then(function (keys) {
                Promise.all(
                  keys.map(function (k) {
                    return caches.delete(k);
                  }),
                ).then(function () {
                  window.location.reload();
                });
              });
            }
          });
        });
      }

      // â”€â”€ Build version: bump this string on every deploy â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      // On a version mismatch we unregister all service workers, wipe every
      // cache, and do a single hard-reload so the browser fetches fresh assets.
      var BUILD_VERSION = "2026-03-09-v4";
      var storedVersion = localStorage.getItem("gfpos_build");

      if (storedVersion !== BUILD_VERSION) {
        localStorage.setItem("gfpos_build", BUILD_VERSION);
        if ("serviceWorker" in navigator && "caches" in window) {
          Promise.all([
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(
                regs.map(function (r) {
                  return r.unregister();
                }),
              );
            }),
            caches.keys().then(function (keys) {
              return Promise.all(
                keys.map(function (k) {
                  return caches.delete(k);
                }),
              );
            }),
          ]).then(function () {
            window.location.reload();
          });
        }
      }

      // â”€â”€ Service Worker: always activate the newest version immediately â”€â”€â”€â”€â”€â”€
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.addEventListener(
          "controllerchange",
          function () {
            window.location.reload();
          },
        );

        navigator.serviceWorker.ready.then(function (registration) {
          document.addEventListener("visibilitychange", function () {
            if (document.visibilityState === "visible") {
              registration.update();
            }
          });

          function activateWaiting(sw) {
            sw.addEventListener("statechange", function () {
              if (sw.state === "installed") {
                sw.postMessage({ type: "SKIP_WAITING" });
              }
            });
            if (sw.state === "installed") {
              sw.postMessage({ type: "SKIP_WAITING" });
            }
          }

          if (registration.waiting) {
            activateWaiting(registration.waiting);
          }
          registration.addEventListener("updatefound", function () {
            if (registration.installing) {
              activateWaiting(registration.installing);
            }
          });
        });
      }

      // â”€â”€ Dismiss loading overlay â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      function dismissLoading() {
        var el = document.getElementById("loading");
        if (el) {
          el.style.transition = "opacity 0.3s ease";
          el.style.opacity = "0";
          setTimeout(function () {
            el.remove();
          }, 350);
        }
      }

      // Dismiss when Flutter fires its first frame (normal path).
      window.addEventListener("flutter-first-frame", dismissLoading);

      // Safety net: if flutter-first-frame never fires (broken SW cache,
      // network error, etc.) forcibly remove the overlay after 15 s so the
      // user sees whatever is on screen rather than an eternal spinner.
      setTimeout(dismissLoading, 15000);
    </script>

    <script>
      // Load flutter_bootstrap with the BUILD_VERSION as a query string.
      // This busts any old service worker cache that has the unversioned URL
      // stored — a new version query causes a SW cache miss and forces a fresh
      // network fetch, guaranteeing the updated app is loaded on every deploy.
      (function () {
        var s = document.createElement('script');
        s.src = 'flutter_bootstrap.js?v=' + BUILD_VERSION;
        s.async = true;
        document.body.appendChild(s);
      })();
    </script>
  </body>
</html>
